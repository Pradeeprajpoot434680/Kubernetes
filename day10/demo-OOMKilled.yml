apiVersion: v1
kind: Pod

metadata:
  name: oom-demo

spec:

  containers:

  - name: memory

    image: polinux/stress

    command:
      - stress

    args:
      - "--vm"
      - "1"
      - "--vm-bytes"
      - "300M"
      - "--vm-hang"
      - "1"

    resources:

      limits:

        memory: "200Mi"

