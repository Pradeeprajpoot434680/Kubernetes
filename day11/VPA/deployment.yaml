apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-vpa

spec:
  replicas: 1

  selector:
    matchLabels:
      app: nginx-vpa

  template:
    metadata:
      labels:
        app: nginx-vpa

    spec:
      containers:
      - name: nginx
        image: nginx:latest

        resources:
          requests:
            cpu: 100m
            memory: 128Mi

          limits:
            cpu: 500m
            memory: 512Mi

        ports:
        - containerPort: 80