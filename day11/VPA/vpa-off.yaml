apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler

metadata:
  name: nginx-vpa

spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nginx-vpa

  updatePolicy:
    updateMode: "Off"

  resourcePolicy:
    containerPolicies:
    - containerName: "*"

      minAllowed:
        cpu: 100m
        memory: 128Mi

      maxAllowed:
        cpu: "2"
        memory: 2Gi