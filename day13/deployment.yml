apiVersion: apps/v1
kind: Deployment

metadata:
  name: spring-app

spec:

  replicas: 1

  selector:
    matchLabels:
      app: spring

  template:

    metadata:

      labels:
        app: spring

    spec:

      containers:

      - name: spring

        image: nginx

        env:

        - name: APP_NAME

          valueFrom:

            configMapKeyRef:

              name: app-config

              key: APP_NAME

        - name: ENVIRONMENT

          valueFrom:

            configMapKeyRef:

              name: app-config

              key: ENVIRONMENT


# 
# envFrom:

# - configMapRef:

#     name: app-config  -> for whole config map