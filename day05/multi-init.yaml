apiVersion: v1
kind: Pod

metadata:
  name: multi-init

spec:

  initContainers:

  - name: init-one

    image: busybox

    command:
    - sh
    - -c
    - |
      echo Init1
      sleep 5

  - name: init-two

    image: busybox

    command:
    - sh
    - -c
    - |
      echo Init2
      sleep 5

  containers:

  - name: app

    image: busybox

    command:
    - sh
    - -c
    - |
      echo App Started
      sleep 3600