apiVersion: v1
kind: Pod

metadata:
  name: shared-volume

spec:

  volumes:
  - name: shared-data
    emptyDir: {}

  containers:

  - name: writer

    image: busybox

    command:
    - sh
    - -c
    - |
      while true
      do
        date >> /shared/log.txt
        sleep 3
      done

    volumeMounts:

    - name: shared-data
      mountPath: /shared

  - name: reader

    image: busybox

    command:
    - sh
    - -c
    - |
      while true
      do
        cat /shared/log.txt
        sleep 5
      done

    volumeMounts:

    - name: shared-data
      mountPath: /shared