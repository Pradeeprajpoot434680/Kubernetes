apiVersion: v1
kind: Pod

metadata:
  name: node-affinity-demo

spec:

  affinity:

    nodeAffinity:

      requiredDuringSchedulingIgnoredDuringExecution:

        nodeSelectorTerms:

        - matchExpressions:

          - key: disk

            operator: In

            values:

            - ssd

  containers:

  - name: nginx

    image: nginx